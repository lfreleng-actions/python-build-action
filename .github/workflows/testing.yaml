---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Action test/validation workflow
name: "Test GitHub Action 🧪"

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  tests:
    name: "Test local GitHub Action"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'audit'

      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Checkout sample project repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "lfreleng-actions/test-python-project"
          path: "test-python-project"
          persist-credentials: false

      - name: "Run action: ${{ github.repository }} [Static versioning]"
        uses: ./
        with:
          path_prefix: "test-python-project"

      - name: "Run action: ${{ github.repository }} [Build using TOX]"
        uses: ./
        with:
          path_prefix: "test-python-project"
          purge_artefact_path: true
          tox_build: true

      - name: "Run action: ${{ github.repository }} [Explicit versioning]"
        uses: ./
        with:
          path_prefix: "test-python-project/"
          purge_artefact_path: true
          tag: "v2.0.0"
          artefact_path: "explicit_tag"

      - name: "Validate artefacts from explicit build"
        shell: bash
        run: |
          set -euo pipefail
          if (find 'test-python-project/explicit_tag' -name '*2.0.0*'); then
            echo "Explicit tag/artefact path as expected ✅"
          else
            echo "Error: build artefact validation failed ❌"; exit 1
          fi

      - name: "Setup dynamic versioning/PDM"
        shell: bash
        run: |
          set -euo pipefail
          cp test-python-project/variations/dynamic.toml \
            test-python-project/pyproject.toml

      - name: "Run action: ${{ github.repository }} [Dynamic versioning/PDM]"
        uses: ./
        with:
          path_prefix: "test-python-project"
          purge_artefact_path: true

      # Phase 4: validate that the existence check accepts setup.cfg-only
      # projects (the previous implementation rejected them). The fixture
      # is a minimal declarative-setuptools project with a literal version,
      # so the build itself should also succeed end-to-end and produce both
      # a wheel and an sdist.
      - name: "Setup setup.cfg-only legacy fixture"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p legacy-cfg-project/sample_pkg
          cat > legacy-cfg-project/sample_pkg/__init__.py <<'PY'
          """Sample package used by python-build-action tests."""
          __version__ = "0.1.0"
          PY
          cat > legacy-cfg-project/setup.cfg <<'CFG'
          [metadata]
          name = legacy-cfg-pkg
          version = 0.1.0
          description = Minimal declarative-setuptools project
          author = Test
          author_email = test@example.org
          license = Apache-2.0
          [options]
          packages = sample_pkg
          python_requires = >=3.10
          CFG
          # Deliberately omit pyproject.toml and setup.py so the
          # action must rely on the setup.cfg fallback in the
          # project-definition existence check AND on the new step
          # that synthesises a minimal pyproject.toml in the runner's
          # checkout (setuptools.build_meta backend) so PyPA `build`
          # can identify the source tree.
          # build-metadata-action expects the project to be a git repo to
          # resolve git-derived metadata. Materialise a tiny repo here.
          git -C legacy-cfg-project init -q
          git -C legacy-cfg-project config user.email test@example.org
          git -C legacy-cfg-project config user.name Test
          git -C legacy-cfg-project add -A
          git -C legacy-cfg-project commit -q -m 'Initial commit'

      - name: "Run action: ${{ github.repository }} [setup.cfg-only]"
        uses: ./
        with:
          path_prefix: "legacy-cfg-project"
          purge_artefact_path: true

      - name: "Validate setup.cfg-only build artefacts"
        shell: bash
        run: |
          set -euo pipefail
          dist=legacy-cfg-project/dist
          if ! ls "$dist"/*.whl >/dev/null 2>&1; then
            echo "Expected at least one wheel under $dist ❌"
            ls -la "$dist" || true
            exit 1
          fi
          if ! ls "$dist"/*.tar.gz >/dev/null 2>&1; then
            echo "Expected an sdist (.tar.gz) under $dist ❌"
            ls -la "$dist" || true
            exit 1
          fi
          echo "setup.cfg-only build produced wheel + sdist ✅"

  test-python-projects:
    name: "${{ matrix.project }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Test projects are defined in the TEST_PROJECTS repository variable
        # Deliberately includes a wide variety of sources
        # All are public and accessible to the runner
        project: ${{ fromJSON(vars.TEST_PROJECTS) }}

    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'audit'

      - name: "Checkout action repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Checkout project repository: ${{ matrix.project }}"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "${{ matrix.project }}"
          path: "project"
          persist-credentials: false

      - name: "Building: ${{ matrix.project }}"
        uses: ./
        with:
          path_prefix: "project"

  test-multi-arch-projects:
    name: "${{ matrix.project }} [${{ matrix.arch.name }}]"
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Multi-arch test projects are defined in the MULTI_ARCH_TEST_PROJECTS
        # repository variable; these build for both x86_64 and ARM64
        project: ${{ fromJSON(vars.MULTI_ARCH_TEST_PROJECTS) }}
        arch:
          - name: x86_64
            runner: ubuntu-latest
          - name: aarch64
            runner: ubuntu-24.04-arm

    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'audit'

      - name: "Checkout action repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Checkout project repository: ${{ matrix.project }}"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "${{ matrix.project }}"
          path: "project"
          persist-credentials: false

      - name: "Derive artefact name"
        id: artefact
        shell: bash
        run: |
          # Extract repo name from org/repo slug
          name="${MATRIX_PROJECT}"
          name="${name##*/}-${MATRIX_ARCH_NAME}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
        env:
          MATRIX_PROJECT: ${{ matrix.project }}
          MATRIX_ARCH_NAME: ${{ matrix.arch.name }}

      # yamllint disable-line rule:line-length
      - name: "Building: ${{ matrix.project }} [${{ matrix.arch.name }}]"
        uses: ./
        with:
          path_prefix: "project"
          # Disambiguate artefact names across architectures
          # to avoid upload-artifact 409 Conflict errors
          artefact_name: "${{ steps.artefact.outputs.name }}"
          auditwheel: true
          manylinux_version: manylinux_2_34
          build_formats: wheel
          # Projects in MULTI_ARCH_TEST_PROJECTS must provide
          # deps-nss and env-github-actions Makefile targets.
          make: true
          make_args: "deps-nss env-github-actions"
