---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# python-build-action
name: '🐍 Build Python Project'
description: 'Builds a Python Project'

inputs:
  # Optional
  artefact_name:
    # Useful when building for multiple platforms/architectures
    # Can be used to avoid uploading artefacts with conflicting names
    description: 'Custom name for uploaded artefacts (defaults to project name)'
    required: false
    # type: string
  artefact_path:
    description: 'Build artefacts will be output to this folder/directory'
    required: false
    # type: string
    default: 'dist'
  artefact_upload:
    description: 'Upload artefacts to GitHub once build completed'
    required: false
    # type: boolean
    default: 'true'
  purge_artefact_path:
    description: 'Purge artefact path prior to performing build'
    required: false
    # type: boolean
    default: 'false'
  tag:
    description: 'Explicit tag/version for this build (semantic)'
    required: false
    # type: string
  skip_version_patch:
    description: 'Skip version patching (support dynamic versioning)'
    required: false
    # type: boolean
    default: 'false'
  attestations:
    # Attestations should NOT be enabled for development builds
    description: 'Apply GitHub attestations to artefacts'
    required: false
    # type: boolean
    default: 'false'
  sigstore_sign:
    # Signing should NOT be enabled for development builds
    description: 'Sign build artefacts with Sigstore'
    required: false
    # type: boolean
    default: 'false'
  path_prefix:
    description: 'Directory location containing project code'
    required: false
    # type: string
    default: '.'
  tox_build:
    description: 'Attempt to use TOX to perform build'
    required: false
    # type: boolean
    default: 'false'
  python_version:
    description: >-
      Override Python version for build (uses metadata detection if not set)
    required: false
    # type: string
  build_formats:
    description: 'Build formats: wheel, sdist, or both (default: both)'
    required: false
    # type: string
    default: 'both'
  auditwheel:
    description: 'Run auditwheel to repair wheels for manylinux compatibility'
    required: false
    # type: boolean
    default: 'false'
  manylinux_version:
    # Examples: manylinux2014, manylinux_2_28, manylinux_2_34, etc.
    description: 'Target manylinux version for auditwheel'
    required: false
    # type: string
    default: 'manylinux_2_34'
  make:
    description: 'Run make before building'
    required: false
    # type: boolean
    default: 'false'
  make_args:
    description: 'Arguments/flags sent to make command'
    required: false
    # type: string
    default: ''

outputs:
  build_python_version:
    description: 'Python version used to perform build (create artefacts)'
    value: "${{ steps.python_version.outputs.python_version }}"
  matrix_json:
    description: 'Project supported Python versions as JSON'
    value: ${{ steps.metadata.outputs.python_matrix_json }}
  artefact_name:
    description: 'Project name used for build artefacts'
    value: ${{ steps.build_summary.outputs.artefact_name }}
  artefact_path:
    description: 'Full path to build artefacts directory'
    value: ${{ steps.build_summary.outputs.artefact_path }}
  path_prefix:
    description: 'Path prefix to Python project (pass to downstream actions)'
    value: ${{ inputs.path_prefix }}

runs:
  using: 'composite'
  steps:
    - name: 'Setup action/environment'
      shell: bash
      run: |
        # Setup action/environment

        # Set input variables
        path_prefix="${INPUTS_PATH_PREFIX}"
        artefact_path="${INPUTS_ARTEFACT_PATH}"
        purge_artefact_path="${INPUTS_PURGE_ARTEFACT_PATH}"

        # Verify path_prefix a valid directory path
        if [ ! -d "$path_prefix" ]; then
          echo 'Error: invalid path/prefix to project directory ❌'; exit 1
        fi

        # Output build heading
        echo '# 🐍 Python Build' >> "$GITHUB_STEP_SUMMARY"

        # Set build parameters/variables
        echo "Action triggered by: ${GITHUB_TRIGGERING_ACTOR}"
        datetime=$(date +'%Y-%m-%d-%H%M')
        echo "Build date and time stamp: $datetime"

        if [ "$purge_artefact_path" != "false" ] && \
          [ -n "$purge_artefact_path" ] && \
          [ -d "$path_prefix/$artefact_path" ]; then
          echo "Purging artefact output path prior to build ⚠️"
          echo "Path: $path_prefix/$artefact_path"
          rm -Rf "$path_prefix/$artefact_path"/*
        fi
      env:
        INPUTS_PATH_PREFIX: ${{ inputs.path_prefix }}
        INPUTS_ARTEFACT_PATH: ${{ inputs.artefact_path }}
        INPUTS_PURGE_ARTEFACT_PATH: ${{ inputs.purge_artefact_path }}

    - name: 'Gather Python project metadata'
      id: metadata
      # yamllint disable-line rule:line-length
      uses: lfreleng-actions/build-metadata-action@ed0cc5bcf3a7ddd4e40058c46fc4211eb71b7f86 # v0.5.0
      with:
        path_prefix: "${{ inputs.path_prefix }}"
        output_format: summary
        include_environment: true
        use_version_extract: true
        verbose: true

    # Catch this condition early in build process
    - name: 'Check project version matches pushed tags'
      # yamllint disable rule:line-length
      if: github.ref_type == 'tag' && steps.metadata.outputs.python_versioning_type != 'dynamic'
      uses: lfreleng-actions/python-project-tag-push-verify-action@f55105a6dfbf71b81687800473a54c24de690559 # v0.2.0
      # yamllint enable rule:line-length
      with:
        path_prefix: "${{ inputs.path_prefix }}"

    - name: 'Fetch tags to support dynamic versioning'
      # yamllint disable rule:line-length
      # Skip the fetch for off-tag PBR builds: we synthesise PBR_VERSION
      # below so PBR does not need git tag history, and the fetch would
      # otherwise fail in trees without an accessible `origin` remote.
      # For other dynamic providers (setuptools-scm, hatch-vcs, etc.)
      # the fetch is best-effort: we attempt it when an `origin` remote
      # is configured, but a missing remote is not fatal because local
      # tags/history may already be sufficient for the provider to
      # resolve a version.
      if: >-
        github.ref_type != 'tag'
        && steps.metadata.outputs.python_versioning_type == 'dynamic'
        && steps.metadata.outputs.python_dynamic_provider != 'pbr'
      shell: bash
      run: |
        # Fetch tags to support dynamic versioning
        # ...but NOT when a tag push triggered the build
        path_prefix="${INPUTS_PATH_PREFIX}"
        # Only unshallow if the repository is a shallow clone
        shallow_repo=$(git -C "$path_prefix" rev-parse --is-shallow-repository 2>/dev/null) || \
          { echo "Error: git rev-parse --is-shallow-repository failed" >&2; exit 1; }
        # Skip all remote operations when no `origin` is configured;
        # the local clone may already carry sufficient tags/history
        # for the dynamic-versioning provider to resolve a version.
        # This check runs BEFORE the unshallow fetch, because
        # `git fetch --unshallow` also requires a reachable `origin`
        # and would otherwise abort the action for shallow checkouts
        # without an accessible remote.
        if ! git -C "$path_prefix" remote get-url origin >/dev/null 2>&1; then
          echo "Dynamic versioning: no 'origin' remote; skipping tag fetch 💬" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "No 'origin' remote configured; relying on local tags/history ℹ️"
          exit 0
        fi
        if [ "$shallow_repo" = "true" ]; then
          echo "Unshallowing repository ⏩"
          if ! git -C "$path_prefix" fetch --unshallow; then
            echo "Warning: 'git fetch --unshallow' failed; relying on local history ⚠️" >&2
            echo "Dynamic versioning: unshallow failed; using local history 💬" \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
        fi
        if ! git -C "$path_prefix" fetch --tags origin; then
          echo "Warning: 'git fetch --tags origin' failed; relying on local tags/history ⚠️" >&2
          echo "Dynamic versioning: 'git fetch --tags origin' failed; using local tags 💬" \
            >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        echo "Dynamic versioning: fetched repository tags 💬" \
          >> "$GITHUB_STEP_SUMMARY"
      env:
        INPUTS_PATH_PREFIX: ${{ inputs.path_prefix }}

    - name: 'Explicit build versioning'
      if: inputs.tag != ''
      shell: bash
      run: |
        # Explicit build versioning
        echo "Explicit build versioning: ${INPUTS_TAG} 💬" \
          >> "$GITHUB_STEP_SUMMARY"
      env:
        INPUTS_TAG: ${{ inputs.tag }}

    - name: 'Patch project versioning metadata'
      # Optionally patch Python project file to match requested build tag
      # Skip patching if skip_version_patch is true for dynamic versioning
      # Also skip patching if tag matches project version
      if: >-
        inputs.skip_version_patch != 'true' &&
        inputs.tag != '' &&
        steps.metadata.outputs.project_version != inputs.tag &&
        steps.metadata.outputs.python_versioning_type != 'dynamic'
      # yamllint disable-line rule:line-length
      uses: lfreleng-actions/python-project-version-patch-action@597e6ec2bcd61786ca01ae549801c3b8fc7764cb # v0.1.9
      with:
        replacement_version: "${{ inputs.tag }}"
        path_prefix: "${{ inputs.path_prefix }}"

    - name: 'Determine Python version for build'
      id: python_version
      shell: bash
      run: |
        # Determine Python version for build
        if [ -n "${INPUTS_PYTHON_VERSION}" ]; then
          python_version="${INPUTS_PYTHON_VERSION}"
          echo "Using override Python version: $python_version 🔧"
        else
          python_version="${STEPS_METADATA_OUTPUTS_PYTHON_BUILD_VERSION}"
          if [ -z "$python_version" ]; then
            echo "Error: Python version not available ❌" >&2
            echo "Could not determine Python version from metadata or input" >&2
            exit 1
          fi
          echo "Using Python version from metadata: $python_version 💬"
        fi
        echo "python_version=$python_version" >> "$GITHUB_OUTPUT"
      env:
        INPUTS_PYTHON_VERSION: ${{ inputs.python_version }}
        STEPS_METADATA_OUTPUTS_PYTHON_BUILD_VERSION: ${{ steps.metadata.outputs.python_build_version }}

    - name: 'Surface metadata fallback warnings'
      # When build-metadata-action could not derive a Python version from
      # the project metadata it falls back to a sensible default matrix.
      # Surface this clearly so the user knows the choice was a guess.
      # Only warn when no explicit python_version override was supplied;
      # otherwise the build uses the override and the fallback is moot.
      # Runs immediately after the Python version is known so the message
      # is not blocked by failures in setup-python, cache, pip bootstrap,
      # build-dependency install, the optional make hook, or any build
      # step that follows.
      if: >-
        steps.metadata.outputs.python_requires_python_fallback == 'true'
        && inputs.python_version == ''
      shell: bash
      env:
        FALLBACK_VERSION: ${{ steps.python_version.outputs.python_version }}
      run: |
        msg="⚠️ Project metadata declares no requires-python and no"
        msg="$msg Python classifiers. Using fallback Python"
        msg="$msg ${FALLBACK_VERSION} for the build."
        hint="Consider adding requires-python (PEP 621 pyproject.toml)"
        hint="$hint or python_requires (setup.cfg [options]) or"
        hint="$hint 'Programming Language :: Python :: 3 :: Only' /"
        hint="$hint 'Programming Language :: Python :: 3.<minor>'"
        hint="$hint Trove classifiers (e.g. 'Programming Language ::"
        hint="$hint Python :: 3.10')."
        echo "$msg"
        echo "$hint"
        echo "$msg" >> "$GITHUB_STEP_SUMMARY"
        echo "$hint" >> "$GITHUB_STEP_SUMMARY"

    - name: 'Setup Python'
      # yamllint disable-line rule:line-length
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        # yamllint disable-line rule:line-length
        python-version: "${{ steps.python_version.outputs.python_version }}"

    - name: 'Cache Python dependencies'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.cache/pip
          ~/.cache/pypoetry
          ~/.cache/pipenv
          .venv
          .tox
        # yamllint disable rule:line-length
        key: >-
          python-${{ runner.os }}-${{ steps.python_version.outputs.python_version }}-
          ${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/poetry.lock', '**/Pipfile*', '**/setup.py', '**/setup.cfg') }}
        restore-keys: |
          python-${{ runner.os }}-${{ steps.python_version.outputs.python_version }}-
          python-${{ runner.os }}-
        # yamllint enable rule:line-length

    - name: 'Ensure pip is available'
      shell: bash
      run: |
        # Ensure pip is available
        # On some runners (e.g. ubuntu-24.04-arm), actions/setup-python
        # may not bootstrap pip correctly, resulting in:
        #   ModuleNotFoundError: No module named 'pip'
        ensurepip_ran=false
        if ! python -m pip --version > /dev/null 2>&1; then
          echo "pip not found; running ensurepip 🔧"
          python -m ensurepip --upgrade
          ensurepip_ran=true
        fi
        if [ "$ensurepip_ran" = true ]; then
          python -m pip install --disable-pip-version-check \
            -q --upgrade pip
        fi
        echo "$(python -m pip --version) ✅"

    - name: 'Install build dependencies'
      shell: bash
      run: |
        # Install build dependencies
        echo 'Installing Python build dependencies...'
        python -m pip install --disable-pip-version-check \
          -q --upgrade build packaging
        echo 'Build dependencies installed ✅'

    - name: 'Synthesise pyproject.toml for setup.cfg-only projects'
      # PyPA `build` requires pyproject.toml or setup.py to identify a
      # source tree; a project that ships only setup.cfg is rejected
      # with "Source does not appear to be a Python project". Setuptools
      # documents an explicit [build-system] table as the supported way
      # to opt declarative-only projects into PEP 517 with the
      # setuptools.build_meta backend.
      # Ref: https://setuptools.pypa.io/en/latest/build_meta.html
      #
      # The synthesised file is written into the runner's checkout only
      # (under inputs.path_prefix) and is never committed back to the
      # consumer's repository. A paired cleanup step at the end of this
      # action removes the file when the build is finished, so the
      # workspace is left in the same state we found it in. Skip
      # silently when the project already provides pyproject.toml or
      # setup.py, or when no setup.cfg is present (there is nothing
      # legacy to coerce into PEP 517).
      id: synth_pyproject
      shell: bash
      env:
        PATH_PREFIX: ${{ inputs.path_prefix }}
      run: |
        # Synthesise pyproject.toml for setup.cfg-only projects
        # GitHub Actions invokes this shell with `bash -e -o pipefail`,
        # so the redirection below already aborts on write failure.
        # The explicit check that follows surfaces a clear error
        # message instead of leaving the next step to fail in
        # `python -m build` with "Source does not appear to be a
        # Python project".
        prefix="${PATH_PREFIX:-.}"
        if [ -f "$prefix/pyproject.toml" ] \
           || [ -f "$prefix/setup.py" ]; then
          exit 0
        fi
        if [ ! -f "$prefix/setup.cfg" ]; then
          exit 0
        fi
        target="$prefix/pyproject.toml"
        if ! {
          echo '[build-system]'
          echo 'requires = ["setuptools>=61", "wheel"]'
          echo 'build-backend = "setuptools.build_meta"'
        } > "$target"; then
          echo "Error: failed to write '$target' ❌"
          echo "Check that '$prefix' exists and is writable"
          exit 1
        fi
        if [ ! -s "$target" ]; then
          echo "Error: synthesised '$target' is empty ❌"
          exit 1
        fi
        echo "synthesised=true" >> "$GITHUB_OUTPUT"
        echo "path=$target" >> "$GITHUB_OUTPUT"
        echo "Synthesised minimal pyproject.toml in '$prefix' for"
        echo "setup.cfg-only project (setuptools.build_meta backend) ℹ️"

    - name: 'Synthesise PBR_VERSION for dynamic PBR builds'
      # PBR resolves the version from a git tag at build time. Off-tag
      # builds therefore need PBR_VERSION injected explicitly or the
      # build fails with: "Versioning for this project requires either
      # an sdist tarball, or access to an upstream git repository".
      #
      # When the caller supplied an explicit `tag` input we prefer
      # that value verbatim so the artefacts match the caller's
      # requested version. When `PBR_VERSION` is already present in
      # the workflow/job environment we treat that as an explicit
      # caller override and skip synthesis entirely. Otherwise we
      # synthesise a PEP 440 dev release of the form
      # 0.0.0.dev<commit_timestamp> using the HEAD commit's
      # committer timestamp (git %ct). That timestamp is stable
      # for a given commit (so concurrent matrix jobs produce the
      # same version) and avoids a local version segment
      # (+gXXXXX) which PyPI rejects.
      #
      # Tag-triggered workflow runs (github.ref_type == 'tag') let
      # PBR derive the version itself.
      id: pbr_version
      if: >-
        steps.metadata.outputs.python_dynamic_provider == 'pbr'
        && github.ref_type != 'tag'
      shell: bash
      env:
        PATH_PREFIX: ${{ inputs.path_prefix }}
        TAG_INPUT: ${{ inputs.tag }}
        EXISTING_PBR_VERSION: ${{ env.PBR_VERSION }}
      run: |
        # Synthesise PBR_VERSION for dynamic PBR builds.
        #
        # Precedence (highest first):
        #   1. `inputs.tag` -- caller-supplied explicit version. Always
        #      wins because the user has asked the action to produce a
        #      specific release version.
        #   2. Pre-existing `PBR_VERSION` in the job/workflow env -- the
        #      caller has set PBR's documented override directly.
        #   3. A synthesised `0.0.0.dev<timestamp>` dev release.
        #
        # The step output `pbr_version` carries either the explicit tag
        # or the synthesised dev value (collectively "action-provided");
        # it stays empty when an existing env value is honoured so the
        # build steps inherit that value untouched.
        if [ -n "$TAG_INPUT" ]; then
          synth="$TAG_INPUT"
          reason="using caller-supplied tag input"
          verb="set"
        elif [ -n "${EXISTING_PBR_VERSION:-}" ]; then
          echo "ℹ️ PBR dynamic build off-tag:"
          echo "  caller already provided PBR_VERSION=${EXISTING_PBR_VERSION}"
          echo "  skipping synthesis to honour the explicit override"
          summary="PBR build (off-tag): using caller-provided"
          summary="$summary \`PBR_VERSION=${EXISTING_PBR_VERSION}\`"
          echo "$summary" >> "$GITHUB_STEP_SUMMARY"
          # Deliberately leave the step output empty so the build
          # step sees no action-provided value and inherits the
          # caller-provided PBR_VERSION from the environment.
          exit 0
        else
          ts=$(
            git -C "$PATH_PREFIX" log -1 --format=%ct HEAD 2>/dev/null
          ) || ts=""
          if [ -z "$ts" ]; then
            ts=$(date -u +%s)
            reason="no git history; using wall-clock timestamp"
          else
            reason="using HEAD commit timestamp"
          fi
          synth="0.0.0.dev${ts}"
          verb="synthesised"
        fi
        echo "pbr_version=${synth}" >> "$GITHUB_OUTPUT"
        echo "ℹ️ PBR dynamic build off-tag (${reason}):"
        echo "  injecting PBR_VERSION=${synth}"
        summary="PBR build (off-tag, ${reason}):"
        summary="$summary ${verb} \`PBR_VERSION=${synth}\`"
        echo "$summary" >> "$GITHUB_STEP_SUMMARY"

    - name: 'Prepare make arguments'
      if: inputs.make == 'true'
      id: make_prep
      shell: bash
      run: |
        # Prepare make arguments
        args="${INPUTS_MAKE_ARGS}"
        if [ -n "${INPUTS_PATH_PREFIX}" ] && \
           [ "${INPUTS_PATH_PREFIX}" != '.' ]; then
          args="-C \"${INPUTS_PATH_PREFIX}\" $args"
        fi
        echo "make_args=$args" >> "$GITHUB_OUTPUT"
      env:
        INPUTS_MAKE_ARGS: ${{ inputs.make_args }}
        INPUTS_PATH_PREFIX: ${{ inputs.path_prefix }}

    - name: 'Conditionally run make'
      if: inputs.make == 'true'
      # yamllint disable-line rule:line-length
      uses: lfreleng-actions/make-action@c8ee1397ffedaf3ae5b01c526abda06e1a2a4f54  # v0.1.4
      with:
        make_args: ${{ steps.make_prep.outputs.make_args }}

    - name: "Build with TOX"
      # yamllint disable rule:line-length
      if: inputs.tox_build == 'true'
      shell: bash
      env:
        SYNTH_PBR_VERSION: ${{ steps.pbr_version.outputs.pbr_version }}
        INPUTS_PATH_PREFIX: ${{ inputs.path_prefix }}
      run: |
        # Build with TOX
        echo "Building with tox: some inputs/options may be disregarded ⚠️"

        # Only export PBR_VERSION when the synthesis step produced an
        # action-provided value (caller-supplied `tag` or a synthesised
        # dev release). An empty step output would otherwise clobber any
        # PBR_VERSION the caller (workflow or job-level env) set; in
        # that case the synthesis intentionally deferred to that value.
        tox_overrides=()
        if [ -n "${SYNTH_PBR_VERSION:-}" ]; then
          export PBR_VERSION="$SYNTH_PBR_VERSION"
        fi
        # Apply the tox passenv override whenever PBR_VERSION is present in
        # the build environment, regardless of whether this action synthesised
        # it or the caller supplied it via workflow/job env. Use the shared
        # `testenv` scope so the override propagates to every testenv,
        # including any custom `package_env` the project may have configured
        # in its tox.ini (PBR reads PBR_VERSION during package-build, which
        # tox 4 isolates into a packaging env). Without this, tox's default
        # env isolation filters PBR_VERSION out and PBR-based projects fail
        # at package-build time. The additive `+=` form preserves any
        # existing passenv entries the consumer has configured.
        if [ -n "${PBR_VERSION:-}" ]; then
          tox_overrides+=(
            --override
            "testenv.passenv+=PBR_VERSION"
          )
        fi

        path_prefix="${INPUTS_PATH_PREFIX}"
        if [ -f "$path_prefix/tox.ini" ]; then
          echo "TOX configuration file: $path_prefix/tox.ini"
          python -m pip install --disable-pip-version-check \
            -q --upgrade tox tox-gh-actions
          cmd=(
            tox --root "$path_prefix"
            -c "$path_prefix/tox.ini"
            "${tox_overrides[@]}"
            -e build
          )
          echo "Building with: ${cmd[*]}"
          if ("${cmd[@]}"); then
            echo 'Build with TOX successful ✅'
          else
            echo 'Build with TOX failed ❌'; exit 1
          fi
        else
          echo 'Error: TOX configuration not found ❌'; exit 1
        fi
      # yamllint enable rule:line-length

    - name: 'Build Python project'
      if: inputs.tox_build != 'true'
      shell: bash
      env:
        SYNTH_PBR_VERSION: ${{ steps.pbr_version.outputs.pbr_version }}
        INPUTS_PATH_PREFIX: ${{ inputs.path_prefix }}
        INPUTS_ARTEFACT_PATH: ${{ inputs.artefact_path }}
        INPUTS_BUILD_FORMATS: ${{ inputs.build_formats }}
      run: |
        # Build Python project
        # Export the action-provided PBR_VERSION (which may be the
        # caller-supplied `tag` input or a synthesised dev release)
        # when the synthesis step produced one. Leaving the output
        # empty means the synthesis deliberately deferred to a
        # pre-existing PBR_VERSION inherited from the workflow/job
        # env; do nothing in that case so the inherited value reaches
        # the build.
        if [ -n "${SYNTH_PBR_VERSION:-}" ]; then
          export PBR_VERSION="$SYNTH_PBR_VERSION"
        fi
        path_prefix="${INPUTS_PATH_PREFIX}"
        artefact_path="${INPUTS_ARTEFACT_PATH}"
        build_formats="${INPUTS_BUILD_FORMATS}"

        # Validate build_formats input
        case "$build_formats" in
          wheel|sdist|both)
            # Valid
            ;;
          *)
            echo "Error: Invalid build_formats value: '$build_formats' ❌"
            echo "Valid values are: 'wheel', 'sdist', or 'both'"
            exit 1
            ;;
        esac

        # Determine build flags
        build_flags=""
        if [ "$build_formats" = "wheel" ]; then
          build_flags="--wheel"
        elif [ "$build_formats" = "sdist" ]; then
          build_flags="--sdist"
        fi

        if [ -f "$path_prefix/pyproject.toml" ] || \
        [ -f "$path_prefix/setup.py" ] || \
        [ -f "$path_prefix/setup.cfg" ]; then
          if (python -m build $build_flags --outdir \
            "$path_prefix/$artefact_path" \
            "$path_prefix"); then
            echo 'Build with Python module successful ✅'
          else
            echo 'Build with Python module failed ❌'; exit 1
          fi
        else
          echo 'Error: project definition file not found ❌'
          echo 'Searched for: pyproject.toml, setup.py, setup.cfg'
          exit 1
        fi

    - name: 'Repair wheels with auditwheel'
      # yamllint disable-line rule:line-length
      if: inputs.auditwheel == 'true' && inputs.build_formats != 'sdist'
      shell: bash
      run: |
        # Repair wheels to manylinux format for PyPI compatibility
        path_prefix="${INPUTS_PATH_PREFIX}"
        artefact_path="${INPUTS_ARTEFACT_PATH}"

        # Check if there are any wheels to repair
        if ls "$path_prefix/$artefact_path"/*.whl 1> /dev/null 2>&1; then
          echo "Installing auditwheel..."
          python -m pip install auditwheel

          # Create temp directory for repaired wheels
          mkdir -p "$path_prefix/$artefact_path/wheelhouse"

          # Repair each wheel
          manylinux_version="${INPUTS_MANYLINUX_VERSION}"
          echo "Using manylinux version: $manylinux_version"

          # Detect architecture for platform tag
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then
            platform_tag="${manylinux_version}_x86_64"
          elif [ "$arch" = "aarch64" ]; then
            platform_tag="${manylinux_version}_aarch64"
          else
            echo "⚠️ Unsupported architecture: $arch"
            echo "Supported architectures: x86_64, aarch64"
            echo "Attempting to use platform tag: ${manylinux_version}_${arch}."
            platform_tag="${manylinux_version}_${arch}"
          fi
          echo "Platform tag: $platform_tag"

          for wheel in "$path_prefix/$artefact_path"/*.whl; do
            echo "Repairing wheel: $(basename "$wheel")"

            # Show wheel info (informational only, don't fail on errors)
            auditwheel show "$wheel" || \
              echo "Note: auditwheel show failed for $(basename "$wheel")"

            # Attempt repair
            if auditwheel repair "$wheel" --plat "$platform_tag" \
                -w "$path_prefix/$artefact_path/wheelhouse"; then
              echo "✅ Successfully repaired $(basename "$wheel")"
            else
              echo "⚠️ auditwheel repair failed for $(basename "$wheel")"
              echo "Will keep original build artefact unmodified"
              cp "$wheel" "$path_prefix/$artefact_path/wheelhouse/"
            fi
          done

          # Replace original wheels with repaired ones
          rm -f "$path_prefix/$artefact_path"/*.whl
          mv "$path_prefix/$artefact_path/wheelhouse"/*.whl \
            "$path_prefix/$artefact_path/"
          rmdir "$path_prefix/$artefact_path/wheelhouse"

          echo "Wheel repair completed ✅"
        else
          echo "No wheels found to repair"
        fi
      env:
        INPUTS_PATH_PREFIX: ${{ inputs.path_prefix }}
        INPUTS_ARTEFACT_PATH: ${{ inputs.artefact_path }}
        INPUTS_MANYLINUX_VERSION: ${{ inputs.manylinux_version }}

    - name: 'Build outputs/summary'
      id: build_summary
      shell: bash
      # yamllint disable rule:line-length
      run: |
        # Build outputs/summary
        path_prefix="${INPUTS_PATH_PREFIX}"
        artefact_path="${INPUTS_ARTEFACT_PATH}"
        full_artefact_path="$path_prefix/$artefact_path"

        # Use custom artefact name if provided, otherwise use project name from
        # metadata, falling back to directory basename if that is unavailable
        artefact_name="${INPUTS_ARTEFACT_NAME}"
        if [ -z "$artefact_name" ]; then
          project_name="${STEPS_METADATA_OUTPUTS_PROJECT_NAME}"
          if [ -z "$project_name" ]; then
            project_name=$(basename "$path_prefix")
            echo "Warning: project_name not found in metadata, using: $project_name" >&2
          fi
          artefact_name="$project_name"
        fi

        echo "artefact_name=$artefact_name" >> "$GITHUB_OUTPUT"
        echo "artefact_path=$full_artefact_path" >> "$GITHUB_OUTPUT"
        echo "Artefact name: $artefact_name"
        echo "Artefact path: $full_artefact_path"
        python_version=$(python --version)
        echo "Build with Python $python_version successful ✅"
        echo "Build with $python_version successful ✅" >> "$GITHUB_STEP_SUMMARY"
      env:
        INPUTS_PATH_PREFIX: ${{ inputs.path_prefix }}
        INPUTS_ARTEFACT_PATH: ${{ inputs.artefact_path }}
        INPUTS_ARTEFACT_NAME: ${{ inputs.artefact_name }}
        STEPS_METADATA_OUTPUTS_PROJECT_NAME: ${{ steps.metadata.outputs.project_name }}

    # Note: caution with sequencing of steps
    # Twine validation after attestations/signing causes failures
    # yamllint enable rule:line-length
    - name: 'Validate artefacts with Twine'
      # yamllint disable-line rule:line-length
      uses: lfreleng-actions/python-twine-check-action@8716dc287177035a6e82a2f12e57aa09dc4399e2 # v0.1.2
      with:
        path_prefix: "${{ inputs.path_prefix }}"
        path: "${{ inputs.artefact_path }}"

    - name: 'Perform artefact attestations'
      # yamllint disable-line rule:line-length
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      if: inputs.attestations == 'true'
      with:
        subject-path: "${{ inputs.path_prefix }}/${{ inputs.artefact_path }}/*"

    - name: 'Add heading to separate signing from attestations'
      if: inputs.sigstore_sign == 'true'
      shell: bash
      run: |
        # Add heading to separate signing from attestations
        echo '### Sigstore Signing ✍🏼' >> "$GITHUB_STEP_SUMMARY"

    # SigStore signing adds JSON files to the artefacts directory
    - name: 'Sign packages with SigStore'
      id: sigstore_files
      if: inputs.sigstore_sign == 'true'
      shell: bash
      # yamllint disable rule:line-length
      run: |
        # Build list of files to sign based on build_formats
        files_to_sign=()

        if [ "${INPUTS_BUILD_FORMATS}" = "sdist" ] || [ "${INPUTS_BUILD_FORMATS}" = "both" ]; then
          if ls "${INPUTS_PATH_PREFIX}/${INPUTS_ARTEFACT_PATH}"/*.tar.gz 1> /dev/null 2>&1; then
            files_to_sign+=("${INPUTS_PATH_PREFIX}/${INPUTS_ARTEFACT_PATH}"/*.tar.gz)
          fi
        fi

        if [ "${INPUTS_BUILD_FORMATS}" = "wheel" ] || [ "${INPUTS_BUILD_FORMATS}" = "both" ]; then
          if ls "${INPUTS_PATH_PREFIX}/${INPUTS_ARTEFACT_PATH}"/*.whl 1> /dev/null 2>&1; then
            files_to_sign+=("${INPUTS_PATH_PREFIX}/${INPUTS_ARTEFACT_PATH}"/*.whl)
          fi
        fi

        if [ ${#files_to_sign[@]} -eq 0 ]; then
          echo "❌ No files found to sign"
          exit 1
        fi

        {
          echo "files<<EOF"
          printf '%s\n' "${files_to_sign[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
      env:
        INPUTS_BUILD_FORMATS: ${{ inputs.build_formats }}
        INPUTS_PATH_PREFIX: ${{ inputs.path_prefix }}
        INPUTS_ARTEFACT_PATH: ${{ inputs.artefact_path }}
      # yamllint enable rule:line-length

    - name: 'Run SigStore signing'
      if: inputs.sigstore_sign == 'true'
      # yamllint disable-line rule:line-length
      uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
      env:
        # Prevent uv inside the sigstore action from discovering the
        # calling project's pyproject.toml [tool.uv] configuration.
        # Without this, constraint-dependencies (e.g. pygments>=2.20.0)
        # leak into the action's isolated venv and conflict with its
        # own pinned dependencies (e.g. pygments==2.19.2 via rich).
        UV_NO_CONFIG: '1'
      with:
        inputs: ${{ steps.sigstore_files.outputs.files }}

    - name: 'Upload build artefacts'
      if: inputs.artefact_upload == 'true'
      # yamllint disable-line rule:line-length
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: "${{ steps.build_summary.outputs.artefact_name }}"
        path: "${{ inputs.path_prefix }}/${{ inputs.artefact_path }}"
        if-no-files-found: error
        overwrite: "${{ inputs.purge_artefact_path }}"

    - name: 'Clean up synthesised pyproject.toml'
      # When the setup.cfg-only synthesis step wrote a transient
      # pyproject.toml into the consumer's checkout, remove it now
      # that the build (and any post-build steps that needed it) are
      # done. This keeps the workspace in the same state we found it
      # in, so later steps in the same job -- including `git diff
      # --exit-code` style guards, second build invocations, or
      # downstream actions that inspect the checkout -- do not see a
      # spurious untracked file. `if: always()` ensures cleanup runs
      # even when an earlier step failed, so a failed build does not
      # leak the synthesised file either.
      if: >-
        always()
        && steps.synth_pyproject.outputs.synthesised == 'true'
      shell: bash
      env:
        SYNTH_PATH: ${{ steps.synth_pyproject.outputs.path }}
      run: |
        # Clean up synthesised pyproject.toml
        if [ -n "${SYNTH_PATH:-}" ] && [ -f "$SYNTH_PATH" ]; then
          rm -f "$SYNTH_PATH"
          echo "Removed synthesised '$SYNTH_PATH' ✅"
        fi
